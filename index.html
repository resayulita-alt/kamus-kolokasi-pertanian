<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0f1a;min-height:100vh;color:#e2e8f0}

/* HEADER */
.header{background:linear-gradient(135deg,#065f46,#047857);padding:20px 16px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.header h1{font-size:1.2rem;font-weight:800;color:#fff;margin-bottom:2px}
.header p{font-size:0.72rem;color:#a7f3d0}
.badge-row{display:flex;justify-content:center;gap:8px;margin-top:8px}
.badge{background:rgba(255,255,255,0.15);padding:3px 10px;border-radius:20px;font-size:0.65rem;color:#d1fae5}

/* SEARCH */
.search-box{padding:12px 16px;position:sticky;top:90px;z-index:99;background:#0a0f1a}
.search-input{width:100%;padding:12px 16px 12px 44px;border-radius:12px;border:1px solid #1e293b;background:#1e293b;color:#e2e8f0;font-size:0.9rem;font-family:inherit;outline:none;transition:0.2s}
.search-input:focus{border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,0.15)}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:1rem;opacity:0.5}

/* FILTERS */
.filters{padding:0 16px 8px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:0.72rem;font-family:inherit;cursor:pointer;white-space:nowrap;transition:0.2s}
.filter-btn.active{background:#10b981;border-color:#10b981;color:#fff;font-weight:600}
.filter-btn:hover{border-color:#10b981;color:#e2e8f0}

/* STATS */
.stats{padding:0 16px 8px;display:flex;gap:8px}
.stat-card{flex:1;background:#1e293b;border-radius:10px;padding:10px;text-align:center;border:1px solid #334155}
.stat-num{font-size:1.3rem;font-weight:700;color:#10b981}
.stat-label{font-size:0.6rem;color:#64748b;margin-top:2px}

/* RESULTS */
.results{padding:0 16px 100px}
.result-count{font-size:0.72rem;color:#64748b;margin-bottom:8px;padding:0 4px}

/* CARD */
.card{background:#1e293b;border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid #334155;transition:0.2s;cursor:pointer}
.card:hover{border-color:#10b981;transform:translateY(-1px);box-shadow:0 4px 15px rgba(0,0,0,0.2)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.collocation{font-size:1rem;font-weight:700;color:#10b981;line-height:1.3}
.category-badge{padding:2px 8px;border-radius:12px;font-size:0.6rem;font-weight:600;white-space:nowrap;flex-shrink:0}
.cat-persiapan{background:rgba(59,130,246,0.15);color:#60a5fa}
.cat-penanaman{background:rgba(16,185,129,0.15);color:#34d399}
.cat-pemupukan{background:rgba(251,191,36,0.15);color:#fbbf24}
.cat-pengelolaan{background:rgba(168,85,247,0.15);color:#a78bfa}
.cat-hama{background:rgba(239,68,68,0.15);color:#f87171}
.cat-panen{background:rgba(245,158,11,0.15);color:#fbbf24}
.cat-umum{background:rgba(100,116,139,0.15);color:#94a3b8}

.card-body{margin-top:8px}
.meaning{font-size:0.78rem;color:#cbd5e1;margin-bottom:4px;line-height:1.5}
.meaning strong{color:#e2e8f0}
.example{font-size:0.72rem;color:#64748b;font-style:italic;padding-left:10px;border-left:2px solid #334155;margin-top:6px;line-height:1.5}
.synonyms{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
.syn-tag{background:rgba(16,185,129,0.1);color:#6ee7b7;padding:2px 8px;border-radius:8px;font-size:0.62rem}

.expand-btn{margin-top:8px;font-size:0.72rem;color:#10b981;cursor:pointer;display:flex;align-items:center;gap:4px}

/* DETAIL MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#1e293b;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:24px 20px 40px;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-close{float:right;background:none;border:none;color:#94a3b8;font-size:1.4rem;cursor:pointer;padding:4px}
.modal h2{font-size:1.2rem;color:#10b981;margin-bottom:4px}
.modal .cat-badge{margin-bottom:12px;display:inline-block}
.modal .section{margin-bottom:14px}
.modal .section-title{font-size:0.72rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.modal .section-content{font-size:0.85rem;color:#e2e8f0;line-height:1.6}
.modal .example-box{background:#0f172a;border-radius:10px;padding:12px;margin-top:6px;border-left:3px solid #10b981}
.modal .example-en{font-size:0.82rem;color:#a7f3d0;font-style:italic}
.modal .example-id{font-size:0.78rem;color:#94a3b8;margin-top:4px}

/* FAB */
.fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 20px rgba(16,185,129,0.4);z-index:50;display:flex;align-items:center;justify-content:center;transition:0.2s}
.fab:hover{transform:scale(1.1)}
.fab:active{transform:scale(0.95)}

/* SHARE BTN */
.share-btn{position:fixed;bottom:20px;left:20px;padding:10px 18px;border-radius:28px;background:#25d366;color:#fff;border:none;font-size:0.8rem;font-weight:600;cursor:pointer;box-shadow:0 4px 15px rgba(37,211,102,0.3);z-index:50;font-family:inherit;display:flex;align-items:center;gap:6px}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:3rem;margin-bottom:12px}
.empty-text{font-size:0.85rem;color:#64748b}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
</style>
</head>

// Fix the meaning key that has a typo
data.forEach(d => { if(d.meaningId && d.meaningId.startsWith("K")) d.meaningId = d.meaningId; });

const catClass = {
"Persiapan Lahan":"cat-persiapan","Penanaman":"cat-penanaman","Pemupukan":"cat-pemupukan",
"Pengelolaan Tanaman":"cat-pengelolaan","Hama & Penyakit":"cat-hama",
"Panen & Pasca Panen":"cat-panen","Umum":"cat-umum"
};

const catEmoji = {
"Persiapan Lahan":"🏗️","Penanaman":"🌱","Pemupukan":"🧪",
"Pengelolaan Tanaman":"🌿","Hama & Penyakit":"🐛",
"Panen & Pasca Panen":"🌾","Umum":"📖"
};

let currentFilter = 'all';
let currentSearch = '';

function render(list) {
const container = document.getElementById('results');
document.getElementById('resultCount').textContent = `Menampilkan ${list.length} dari ${data.length} kolokasi`;
document.getElementById('shownCount').textContent = list.length;

if(list.length === 0) {
container.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Tidak ditemukan kolokasi yang cocok.<br>Coba kata kunci lain.</div></div>';
return;
}

let html = '<div class="result-count">Menampilkan '+list.length+' dari '+data.length+' kolokasi</div>';
list.forEach((d,i) => {
html += `<div class="card" onclick="showDetail(${i})">
<div class="card-head">
<div class="collocation">${catEmoji[d.cat]||''} ${d.col}</div>
<span class="category-badge ${catClass[d.cat]||'cat-umum'}">${d.cat}</span>
</div>
<div class="card-body">
<div class="meaning"><strong>EN:</strong> ${d.meaning}</div>
<div class="meaning"><strong>ID:</strong> ${d.meaningId}</div>
<div class="example">"${d.example}"</div>
</div>
</div>`;
});
container.innerHTML = html;
}

function filterAndSearch() {
let list = data;
if(currentFilter !== 'all') list = list.filter(d => d.cat === currentFilter);
if(currentSearch) {
const q = currentSearch.toLowerCase();
list = list.filter(d =>
d.col.toLowerCase().includes(q) ||
d.meaning.toLowerCase().includes(q) ||
d.meaningId.toLowerCase().includes(q) ||
d.cat.toLowerCase().includes(q) ||
d.synonyms.some(s => s.toLowerCase().includes(q))
);
}
render(list);
}

document.getElementById('searchInput').addEventListener('input', e => {
currentSearch = e.target.value;
filterAndSearch();
});

// Also trigger search on Enter key
document.getElementById('searchInput').addEventListener('keyup', e => {
if(e.key === 'Enter') {
currentSearch = e.target.value;
filterAndSearch();
}
});

document.querySelectorAll('.filter-btn').forEach(btn => {
btn.addEventListener('click', () => {
document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
currentFilter = btn.dataset.cat;
filterAndSearch();
});
});

function showDetail(idx) {
const filtered = getFilteredList();
const d = filtered[idx];
if(!d) return;
const modal = document.getElementById('modal');
const body = document.getElementById('modalBody');
body.innerHTML = `
<h2>${catEmoji[d.cat]||''} ${d.col}</h2>
<span class="category-badge ${catClass[d.cat]}" style="font-size:0.72rem;padding:4px 12px">${d.cat}</span>
<div class="section">
<div class="section-title">🇬🇧 Arti (English)</div>
<div class="section-content">${d.meaning}</div>
</div>
<div class="section">
<div class="section-title">🇮🇩 Arti (Indonesia)</div>
<div class="section-content">${d.meaningId}</div>
</div>
<div class="section">
<div class="section-title">📝 Contoh Kalimat</div>
<div class="example-box">
<div class="example-en">${d.example}</div>
<div class="example-id">${d.exampleId}</div>
</div>
</div>
<div class="section">
<div class="section-title">🔗 Sinonim</div>
<div class="synonyms">${d.synonyms.map(s => `<span class="syn-tag">${s}</span>`).join('')}</div>
</div>
`;
modal.classList.add('show');
}

function closeModal(e) {
if(e.target === document.getElementById('modal')) {
document.getElementById('modal').classList.remove('show');
}
}

function getFilteredList() {
let list = data;
if(currentFilter !== 'all') list = list.filter(d => d.cat === currentFilter);
if(currentSearch) {
const q = currentSearch.toLowerCase();
list = list.filter(d =>
d.col.toLowerCase().includes(q) ||
d.meaning.toLowerCase().includes(q) ||
d.meaningId.toLowerCase().includes(q) ||
d.cat.toLowerCase().includes(q) ||
d.synonyms.some(s => s.toLowerCase().includes(q))
);
}
return list;
}

function randomColloc() {

}

// Google Sheets integration
const SHEET_ID = '1_48I42U6sSG7hbjvYAiDgb4nYyAX9rYmY3EOBXa_sXI';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Data+Kolokasi`;

async function loadFromSheet() {
try {
const resp = await fetch(SHEET_URL);
if (!resp.ok) throw new Error('Fetch failed');
const csv = await resp.text();
const rows = csv.split('\n').filter(r => r.trim());
if (rows.length < 2) throw new Error('No data');
const headers = parseCSVRow(rows[0]);
const sheetData = [];
for (let i = 1; i < rows.length; i++) {
const cols = parseCSVRow(rows[i]);
if (cols.length < 4 || !cols[0]) continue;
sheetData.push({
col: cols[0] || '',
meaning: cols[1] || '',
meaningId: cols[2] || '',
cat: cols[3] || 'Umum',
example: cols[4] || '',
exampleId: cols[5] || '',
synonyms: cols[6] ? cols[6].split(',').map(s => s.trim()).filter(Boolean) : []
});
}
if (sheetData.length > 0) {
data = sheetData;
document.getElementById('sheetStatus') && (document.getElementById('sheetStatus').textContent = '📊 Data dari Google Sheet (live)');
console.log('Loaded ' + sheetData.length + ' collocations from Google Sheet');
return true;
}
} catch(e) {
console.log('Google Sheet unavailable, using built-in data: ' + e.message);
}
return false;
}

function parseCSVRow(row) {
const result = [];
let current = '';
let inQuotes = false;
for (let i = 0; i < row.length; i++) {
const ch = row[i];
if (ch === '"') { inQuotes = !inQuotes; }
else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
else { current += ch; }
}
result.push(current.trim());
return result;
}

// Init
async function init() {
// Always render built-in data first
document.getElementById('totalColloc').textContent = data.length;
render(data);

// Then try to load from Google Sheet (optional upgrade)
try {
const fromSheet = await loadFromSheet();
if(fromSheet) {
document.getElementById('totalColloc').textContent = data.length;
render(data);
}
} catch(e) {
console.log('Sheet load error (using built-in data): ' + e.message);
document.getElementById('sheetStatus').textContent = '📊 Data bawaan (offline)';
}
}
init();
</script>
